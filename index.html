<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>AuraStride</title>
</head>
<body>
  <header>
    <img src="logo.png" alt="logo">
    <nav>
      <ul>
        <li><a href="#home">Accueil</a></li>
        <li><a href="#featuredtea">Galerie</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>
  </header>
  <main>
    <section class="mainsection" id="home">
      <div class="band">
        <h1>AuraStride</h1>
        <p>Découvrez l'élégance intemporelle de notre

      </div>
    </section>
    <section class="section1" id="featuredtea">
      <h2>Tea of the month</h2>
      <p>What's Steeping at the Tea Cozy ?</p>
      <div class="cards">
        <div class="card_1">
          <img src="1.png" alt="L'AuraStride de profil">
        </div>
        <div class="card_2">
          <img src="2.png" alt="l'AuraStride en profondeur">
        </div>
        <div class="card_3">
          <img src="3.png" alt="Zoom sur la qualité AuraStride">
        </div>
        <div class="card_4">
          <img src="4.jpg" alt="L'AuraStride en action">
        </div>
        <div class="card_5">
          <img src="5.png" alt="L'AuraStride sous tous ses aspects">
        </div>
        <div class="card_6">
          <p>Découvrez ici la marque AuraStride dans tous ses angles</p>
        </div>
      </div>

  <footer id="contact">
    <p>Copyright &copy; insp 2026 All Right Reserved </p>
